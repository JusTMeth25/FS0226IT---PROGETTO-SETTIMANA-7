<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsHub — Eventi sportivi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <header class="site-header">
    <!-- Titolo dell'app + form di ricerca -->
    <div class="header-row">
      <div>
        <h1>SportsHub</h1>
        <p>Cerca una squadra, scopri prossime partite e ultimi risultati.</p>
      </div>
      <div class="search-bar d-flex gap-2 mx-auto">
        <input class="form-control" type="text" id="searchInput" placeholder="es. Arsenal, Lakers, Real Mardid..."
          aria-label="Cerca squadra">
        <button class="btn btn-primary" id="searchBtn">Cerca</button>
      </div>
    </div>
  </header>

  <main class="container">

    <section id="risultati-section">
      <!-- Spinner, errore, lista risultati ricerca squadre -->
      <h2 class="risultati">⭐ Le tue squadre preferite</h2>
      <div id="preferiti-content">
        <p class="text-secondary mb-4 fst-italic">Non hai ancora salvato nessuna squadra. Cercane una qui sopra e
          aggiungila ai preferiti.</p>
      </div>
      <h2 class="dettagli">Squadre trovate</h2>
      <div id="risultati-content">
        <p class="text-secondary mb-4 fst-italic">Inizia cercando una squadra qui sopra.</p>
      </div>
       <div id="dettagli-squadra-content" class="mt-5"></div>
    </section>

    <section id="dettagli-section" hidden>
      <!-- Visibile dopo click su una squadra: prossimi eventi + ultimi risultati -->
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="assets/script/script.js"></script>
</body>

</html>
